name: Story Summary Update

on:
  schedule:
    - cron: "0 3 * * *"  # 每天北京时间11点 (UTC 3:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        env:
          UV_INDEX_URL: https://pypi.org/simple
        run: uv sync --locked

      - name: Generate latest story summary
        env:
          STORY_SUMMARY_API_KEY: ${{ secrets.STORY_SUMMARY_API_KEY }}
          STORY_SUMMARY_BASE_URL: ${{ vars.STORY_SUMMARY_BASE_URL }}
          STORY_SUMMARY_MODEL: ${{ vars.STORY_SUMMARY_MODEL }}
        run: uv run python -m src.cli update-story-summary

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -d story ]; then
            git add story/
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(data): daily story summary update [skip ci]"
          git push
